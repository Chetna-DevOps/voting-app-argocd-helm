# Configuration values used by Helm templates

replicaCount: 1

image:
  repository: <ACR_LOGIN_SERVER>/votingops/vote
  tag: 422
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: vote-argo-helm.<YOUR-CLUSTER-IP>.nip.io
      paths:
        - /
